# Local cross-compile linker config.
#
# CI uses `cross` (https://github.com/cross-rs/cross) for non-native Linux
# targets — `cross` provides its own sysroot via Docker and sets linkers
# automatically, so we don't configure them here.
#
# For local development, install the matching cross-gcc package and
# uncomment the corresponding block below:
#
# [target.aarch64-unknown-linux-gnu]
# linker = "aarch64-linux-gnu-gcc"
#
# [target.loongarch64-unknown-linux-gnu]
# linker = "loongarch64-linux-gnu-gcc"
#
# [target.riscv64gc-unknown-linux-gnu]
# linker = "riscv64-linux-gnu-gcc"
