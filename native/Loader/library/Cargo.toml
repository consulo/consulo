[package]
name = "consulo-loader-library"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# Produces libconsulo.so / libconsulo.dylib / consulo.dll.
# Distribution packaging renames to consulo64.dll / consulo-aarch64.dll on Windows.
name = "consulo"
crate-type = ["cdylib"]

[features]
default = ["awt"]
awt = ["consulo-loader-core/awt"]
swt = ["consulo-loader-core/swt"]

[dependencies]
anyhow = { workspace = true }
log = { workspace = true }
consulo-loader-core = { path = "../core", default-features = false }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = { workspace = true }

[target.'cfg(target_family = "unix")'.dependencies]
libc = { workspace = true }
