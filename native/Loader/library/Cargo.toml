[package]
name = "consulo-loader-library"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# Produces libconsulo_library.so / libconsulo_library.dylib / consulo_library.dll.
# Unique Cargo-level name avoids the PDB filename collision with the `consulo`
# binary target (cargo issue #6313). The build pipeline renames to the
# shipped filename (libconsulo.{so,dylib}, consulo64.dll, consulo-aarch64.dll).
name = "consulo_library"
crate-type = ["cdylib"]

[features]
default = ["awt"]
awt = ["consulo-loader-core/awt"]
swt = ["consulo-loader-core/swt"]

[dependencies]
anyhow = { workspace = true }
log = { workspace = true }
consulo-loader-core = { path = "../core", default-features = false }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = { workspace = true }

[target.'cfg(target_family = "unix")'.dependencies]
libc = { workspace = true }
