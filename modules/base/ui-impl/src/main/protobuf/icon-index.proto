syntax = "proto3";

package consulo.ui.impl.proto;

message IconGroupIndex {
    int32 version = 1;

    repeated IconGroup iconGroups = 2;
}

message IconGroup {
    string id = 1;

    string theme = 2;

    repeated Icon icons = 3;
}

message Icon {
    string id = 1;

    IconType type = 2;

    IconData x1 = 3;

    IconData x2 = 4;
}

message IconData {
    int32 width = 1;

    int32 height = 2;

    bytes data = 3;
}

enum IconType {
    SVG = 0;
    PNG = 1;
}