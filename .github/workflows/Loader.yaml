name: Loader build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ===== Windows =====
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            loader_src: consulo.exe
            loader_name: consulo.exe
            library_src: consulo_library.dll
            library_name: consulo.dll
          - name: windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            loader_src: consulo.exe
            loader_name: consulo.exe
            library_src: consulo_library.dll
            library_name: consulo.dll

          # ===== macOS (per-arch, no universal) =====
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            loader_src: consulo
            loader_name: consulo
            library_src: libconsulo_library.dylib
            library_name: libconsulo.dylib
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            loader_src: consulo
            loader_name: consulo
            library_src: libconsulo_library.dylib
            library_name: libconsulo.dylib

          # ===== Linux =====
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            loader_src: consulo
            loader_name: consulo
            library_src: libconsulo_library.so
            library_name: libconsulo.so
          - name: linux-aarch64
            os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            apt: gcc-aarch64-linux-gnu
            linker_var: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            linker_bin: aarch64-linux-gnu-gcc
            loader_src: consulo
            loader_name: consulo
            library_src: libconsulo_library.so
            library_name: libconsulo.so
          - name: linux-riscv64
            os: ubuntu-24.04
            target: riscv64gc-unknown-linux-gnu
            apt: gcc-riscv64-linux-gnu
            linker_var: CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER
            linker_bin: riscv64-linux-gnu-gcc
            loader_src: consulo
            loader_name: consulo
            library_src: libconsulo_library.so
            library_name: libconsulo.so
          - name: linux-loongarch64
            os: ubuntu-24.04
            target: loongarch64-unknown-linux-gnu
            loongson: true
            linker_var: CARGO_TARGET_LOONGARCH64_UNKNOWN_LINUX_GNU_LINKER
            linker_bin: loongarch64-unknown-linux-gnu-gcc
            loader_src: consulo
            loader_name: consulo
            library_src: libconsulo_library.so
            library_name: libconsulo.so

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install apt cross-linker
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install Loongson toolchain
        if: matrix.loongson
        run: |
          URL="https://github.com/loongson/build-tools/releases/download/2024.08.08/x86_64-cross-tools-loongarch64-binutils_2.43-gcc_14.2.0-glibc_2.40.tar.xz"
          wget -q "$URL" -O /tmp/loongson.tar.xz
          sudo mkdir -p /opt/loongson
          sudo tar -xf /tmp/loongson.tar.xz -C /opt/loongson --strip-components=1
          echo "/opt/loongson/bin" >> $GITHUB_PATH

      - name: Configure linker env
        if: matrix.linker_var
        run: echo "${{ matrix.linker_var }}=${{ matrix.linker_bin }}" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/Loader

      - name: Build release
        working-directory: native/Loader
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run unit tests (host targets only)
        if: matrix.name == 'linux-x86_64' || matrix.name == 'macos-aarch64' || matrix.name == 'windows-x86_64'
        working-directory: native/Loader
        run: cargo test --release --target ${{ matrix.target }}

      - name: Rename artifacts (loader)
        if: matrix.loader_src != matrix.loader_name
        shell: bash
        run: |
          cd native/Loader/target/${{ matrix.target }}/release
          mv "${{ matrix.loader_src }}" "${{ matrix.loader_name }}"

      - name: Rename artifacts (library)
        if: matrix.library_src != matrix.library_name
        shell: bash
        run: |
          cd native/Loader/target/${{ matrix.target }}/release
          mv "${{ matrix.library_src }}" "${{ matrix.library_name }}"

      - name: Upload loader
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.loader_name }}-${{ matrix.name }}
          path: native/Loader/target/${{ matrix.target }}/release/${{ matrix.loader_name }}
          if-no-files-found: error

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.library_name }}-${{ matrix.name }}
          path: native/Loader/target/${{ matrix.target }}/release/${{ matrix.library_name }}
          if-no-files-found: error

  publish:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: binaries-publish
      cancel-in-progress: false
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Arrange binaries by os-arch
        run: |
          set -euo pipefail
          mkdir -p out
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            for plat in windows-x86_64 windows-aarch64 macos-x86_64 macos-aarch64 linux-x86_64 linux-aarch64 linux-riscv64 linux-loongarch64; do
              if [[ "$name" == *"-$plat" ]]; then
                mkdir -p "out/$plat"
                cp "$dir"* "out/$plat/"
                break
              fi
            done
          done
          find out -type f

      - name: Commit and push to consulo/binaries
        env:
          CONSULO_BOT_TOKEN: ${{ secrets.CONSULO_BOT_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://consulo-bot:${CONSULO_BOT_TOKEN}@github.com/consulo/binaries.git" binaries-repo
          cd binaries-repo
          git checkout master 2>/dev/null || git checkout --orphan master
          git config user.name "consulo Bot"
          git config user.email "consulo.bot@gmail.com"
          cp -r ../out/. .
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update loader binaries from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"
            git push -u origin master
          fi
