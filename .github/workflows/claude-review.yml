name: Claude Code Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup fork remote for cross-repo PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_FORK=$(gh pr view ${{ github.event.issue.number }} --json isCrossRepository -q '.isCrossRepository')
          if [ "$IS_FORK" = "true" ]; then
            FORK_REPO=$(gh pr view ${{ github.event.issue.number }} --json headRepository -q '.headRepository.nameWithOwner')
            PR_BRANCH=$(gh pr view ${{ github.event.issue.number }} --json headRefName -q '.headRefName')
            git remote rename origin upstream
            git remote add origin "https://github.com/$FORK_REPO.git"
            git fetch origin "$PR_BRANCH" --depth=20
          fi

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
