name: Claude PR Review

on:
    pull_request:
        types: [opened, synchronize]

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    review:
        runs-on: ubuntu-latest
        steps:
            -   uses: drillan/claude-pr-reviewer@v1
                with:
                    anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                    anthropic_model: claude-opus-4-6